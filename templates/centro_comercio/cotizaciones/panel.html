{% extends "layout/base.html" %}
{% load static %}

{% block title %}Centro de Comercio — Cotizaciones{% endblock %}
{% block page_title %}Cotizaciones{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-3">
    <div class="d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <i class="fas fa-file-invoice text-danger mr-2"></i>
        <h5 class="mb-0 font-weight-bold">Cotizaciones</h5>
      </div>

      <button id="btnNuevo" class="btn btn-success">
        <i class="fas fa-plus"></i> Nuevo
      </button>
    </div>

    <hr class="my-3">

    <!-- Filtros -->
    <div class="form-row align-items-center">
      <div class="col-auto mb-2">
        <select id="fEstado" class="form-control form-control-sm" style="min-width:140px;">
          <option value="">Todas</option>
          <option value="PEND">Pendientes</option>
          <option value="ACEP">Aceptadas</option>
          <option value="ANUL">Anuladas</option>
        </select>
      </div>

      <div class="col-auto mb-2">
        <input id="fBuscar" type="text" class="form-control form-control-sm" placeholder="Buscar..." style="min-width:220px;">
      </div>

      <div class="col-auto mb-2">
        <button id="btnFiltrar" class="btn btn-sm btn-secondary">
          <i class="fas fa-filter"></i> Filtrar
        </button>
      </div>

      <div class="col mb-2 text-right">
        <small class="text-muted" id="lblEstadoCarga"></small>
      </div>
    </div>

    <!-- Tabla dinámica -->
    <div id="tablaWrap" class="mt-2">
      <div class="text-center py-4 text-muted">
        <i class="fas fa-spinner fa-spin mr-1"></i> Cargando...
      </div>
    </div>
  </div>
</div>

<!-- Modal grande -->
<div class="modal fade" id="cotModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-xl" role="document">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="cotModalTitle">
          <i class="fas fa-file-invoice text-danger mr-2"></i> Cotizaciones
        </h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body" id="cotModalBody">
        <div class="text-center py-4 text-muted">
          <i class="fas fa-spinner fa-spin mr-1"></i> Cargando...
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  // --------------------------
  // Helpers
  // --------------------------
  function qs(sel, root){ return (root || document).querySelector(sel); }

  function setLoading(el, msg){
    el.innerHTML = `
      <div class="text-center py-4 text-muted">
        <i class="fas fa-spinner fa-spin mr-1"></i> ${msg || 'Cargando...'}
      </div>`;
  }

  async function fetchHTML(url, opts){
    const res = await fetch(url, opts || {});
    const text = await res.text();
    return { ok: res.ok, status: res.status, text, res };
  }

  async function fetchJSON(url, opts){
    const res = await fetch(url, opts || {});
    const data = await res.json().catch(() => null);
    return { ok: res.ok, status: res.status, data, res };
  }

  function getCSRF(fromEl){
    const root = fromEl || document;
    const input = root.querySelector('input[name="csrfmiddlewaretoken"]');
    return input ? input.value : null;
  }

  function clearValidation(root){
    root.querySelectorAll(".is-invalid").forEach(el => el.classList.remove("is-invalid"));
    const alert = root.querySelector("[data-cot-errors]");
    if (alert) alert.remove();
  }

  function humanizeErrors(errorsObj){
    // errorsObj típico Django: { campo: ["msg1", "msg2"] }
    const lines = [];
    if (!errorsObj) return lines;
    Object.keys(errorsObj).forEach((k) => {
      const msgs = errorsObj[k];
      if (Array.isArray(msgs)) {
        msgs.forEach(m => lines.push(`${k}: ${m}`));
      } else {
        lines.push(`${k}: ${msgs}`);
      }
    });
    return lines;
  }

  function showErrorsInModal(form, payload){
    // payload: { errors, formset_errors, non_form_errors }
    clearValidation(form);

    const lines = [];

    // errores del form principal
    lines.push(...humanizeErrors(payload && payload.errors));

    // non form errors del formset (ej: "Debe haber al menos 1 item")
    if (payload && payload.non_form_errors) {
      // Django suele devolver lista/ul. Lo convertimos a texto
      if (Array.isArray(payload.non_form_errors)) {
        payload.non_form_errors.forEach(e => lines.push(`Items: ${e}`));
      } else {
        lines.push(`Items: ${payload.non_form_errors}`);
      }
    }

    // errores del formset (lista por fila)
    if (payload && Array.isArray(payload.formset_errors)) {
      payload.formset_errors.forEach((rowErr, idx) => {
        const rowLines = humanizeErrors(rowErr);
        rowLines.forEach(l => lines.push(`Item ${idx+1} → ${l}`));
      });
    }

    // Si no hay líneas, igual avisamos
    if (!lines.length) {
      lines.push("No se pudo guardar. Revisa los campos requeridos.");
    }

    // Insertar alerta arriba del form
    const alert = document.createElement("div");
    alert.className = "alert alert-danger py-2";
    alert.setAttribute("data-cot-errors", "1");
    alert.innerHTML = `
      <div class="d-flex align-items-start">
        <i class="fas fa-exclamation-triangle mr-2 mt-1"></i>
        <div>
          <strong>No se pudo guardar</strong>
          <ul class="mb-0 mt-1" style="padding-left: 18px;">
            ${lines.map(l => `<li>${l}</li>`).join("")}
          </ul>
        </div>
      </div>
    `;
    form.prepend(alert);

    // Marcar inputs del form principal (si el nombre coincide)
    if (payload && payload.errors) {
      Object.keys(payload.errors).forEach((field) => {
        const el = form.querySelector(`[name="${field}"]`);
        if (el) el.classList.add("is-invalid");
      });
    }

    // Marcar inputs del formset por fila
    if (payload && Array.isArray(payload.formset_errors)) {
      payload.formset_errors.forEach((rowErr, idx) => {
        if (!rowErr) return;
        Object.keys(rowErr).forEach((field) => {
          // Django formset: form-0-titulo / form-0-unidad etc
          const el = form.querySelector(`[name$="-${field}"][name^="form-${idx}-"]`);
          if (el) el.classList.add("is-invalid");
        });
      });
    }
  }

  // --------------------------
  // URLs
  // --------------------------
  const URLS = {
    lista: "{% url 'centro_comercio:cotizaciones_lista' %}",
    nuevo: "{% url 'centro_comercio:cotizacion_nuevo' %}",
  };

  function urlDetalle(id){ return "{% url 'centro_comercio:cotizacion_detalle' 0 %}".replace("/0/", "/" + id + "/"); }
  function urlEditar(id){ return "{% url 'centro_comercio:cotizacion_editar' 0 %}".replace("/0/", "/" + id + "/"); }
  function urlEliminar(id){ return "{% url 'centro_comercio:cotizacion_eliminar' 0 %}".replace("/0/", "/" + id + "/"); }

  // --------------------------
  // Estado UI
  // --------------------------
  const tablaWrap = qs("#tablaWrap");
  const fEstado = qs("#fEstado");
  const fBuscar = qs("#fBuscar");
  const btnFiltrar = qs("#btnFiltrar");
  const btnNuevo = qs("#btnNuevo");
  const lblEstadoCarga = qs("#lblEstadoCarga");

  const modalBody = qs("#cotModalBody");
  const modalTitle = qs("#cotModalTitle");

  function currentQuery(){
    const q = (fBuscar.value || "").trim();
    const estado = (fEstado.value || "").trim();
    const params = new URLSearchParams();
    if (q) params.set("q", q);
    if (estado) params.set("estado", estado);
    return params.toString();
  }

  // --------------------------
  // Boot del form (cálculos)
  // --------------------------
  function bootCotForm() {
    try {
      if (typeof window.inicializarCotizacionForm === 'function') {
        window.inicializarCotizacionForm(modalBody);
      } else if (typeof window.initCotizacionForm === 'function') {
        window.initCotizacionForm(modalBody);
      }
    } catch (e) {
      console.error("❌ bootCotForm:", e);
    }
  }

  // --------------------------
  // Tabla
  // --------------------------
  async function cargarTabla(){
    lblEstadoCarga.textContent = "Actualizando...";
    setLoading(tablaWrap, "Cargando cotizaciones...");
    const url = URLS.lista + (currentQuery() ? ("?" + currentQuery()) : "");
    const r = await fetchHTML(url, { headers: { "X-Requested-With": "XMLHttpRequest" } });
    tablaWrap.innerHTML = r.text;
    lblEstadoCarga.textContent = "";
  }

  // --------------------------
  // Modal
  // --------------------------
  function openModal(title){
    modalTitle.innerHTML = title || '<i class="fas fa-file-invoice text-danger mr-2"></i> Cotizaciones';
    setLoading(modalBody, "Cargando...");
    $("#cotModal").modal("show");
  }

  async function abrirNuevo(){
    openModal('<i class="fas fa-plus text-success mr-2"></i> Nueva cotización');
    const r = await fetchHTML(URLS.nuevo, { headers: { "X-Requested-With": "XMLHttpRequest" } });
    modalBody.innerHTML = r.text;

    $('#cotModal').off('shown.bs.modal.cot').on('shown.bs.modal.cot', function () {
      bootCotForm();
      bindFormInsideModal();
    });
  }

  async function abrirEditar(id){
    openModal('<i class="fas fa-edit text-primary mr-2"></i> Editar cotización ' + id);
    const r = await fetchHTML(urlEditar(id), { headers: { "X-Requested-With": "XMLHttpRequest" } });
    modalBody.innerHTML = r.text;

    $('#cotModal').off('shown.bs.modal.cot').on('shown.bs.modal.cot', function () {
      bootCotForm();
      bindFormInsideModal();
    });
  }

  async function abrirDetalle(id){
    openModal('<i class="far fa-eye text-primary mr-2"></i> Detalle cotización ' + id);
    const r = await fetchHTML(urlDetalle(id), { headers: { "X-Requested-With": "XMLHttpRequest" } });
    modalBody.innerHTML = r.text;

    $('#cotModal').off('shown.bs.modal.cot').on('shown.bs.modal.cot', function () {
      bindDetalleInsideModal();
    });
  }

  // --------------------------
  // Acciones en tabla (Ver / Editar / Eliminar)
  // --------------------------
  function bindTablaActions(){
    tablaWrap.addEventListener("click", function(e){
      const btnVer = e.target.closest(".btn-ver, [data-action='ver']");
      if (btnVer) {
        const tr = btnVer.closest("tr[data-id]");
        if (!tr) return;
        abrirDetalle(tr.getAttribute("data-id"));
        return;
      }

      const btnEdit = e.target.closest(".btn-editar, [data-action='editar']");
      if (btnEdit) {
        const tr = btnEdit.closest("tr[data-id]");
        if (!tr) return;
        abrirEditar(tr.getAttribute("data-id"));
        return;
      }

      const btnDel = e.target.closest(".btn-eliminar, [data-action='eliminar']");
      if (btnDel) {
        const tr = btnDel.closest("tr[data-id]");
        if (!tr) return;
        const id = tr.getAttribute("data-id");
        if (!id) return;

        if (!confirm("¿Eliminar esta cotización?")) return;

        fetchJSON(urlEliminar(id), {
          method: "POST",
          headers: {
            "X-Requested-With": "XMLHttpRequest",
            "X-CSRFToken": getCSRF(document) || ""
          }
        }).then(async (r) => {
          if (r.ok && r.data && r.data.ok) {
            await cargarTabla();
          } else {
            alert("No se pudo eliminar.");
          }
        });
        return;
      }
    });
  }

  // --------------------------
  // Submit AJAX dentro del modal (ARREGLADO: mostrar errores reales)
  // --------------------------
  function precheckItems(form){
    // Si el usuario llenó cantidad/valor pero dejó título vacío, avisamos antes.
    const rows = form.querySelectorAll("#items-table tbody tr.item-row");
    for (const row of rows) {
      const del = row.querySelector('input[type="checkbox"][name$="-DELETE"]');
      if (del && del.checked) continue;

      const titulo = row.querySelector('[name$="-titulo"]');
      const unidad = row.querySelector('[name$="-unidad"]');
      const cant = row.querySelector('[name$="-cantidad"]');
      const val = row.querySelector('[name$="-valor_unitario"]');

      const hasNumbers = (cant && String(cant.value || "").trim() !== "") || (val && String(val.value || "").trim() !== "");
      if (hasNumbers) {
        if (titulo && !String(titulo.value || "").trim()) return "Falta el Título en uno o más ítems.";
        if (unidad && !String(unidad.value || "").trim()) return "Falta la Unidad en uno o más ítems.";
      }
    }
    return null;
  }

  function sanitizeNumbers(form){
    // limpiar números para Django (quita $, espacios y miles)
    form.querySelectorAll('[name$="descuento"],[name$="valor_unitario"],[name$="cantidad"]').forEach((el)=>{
      if (!el || el.type === "checkbox") return;
      el.value = String(el.value || "")
        .replace(/\$/g,"")
        .replace(/\s/g,"")
        .replace(/\./g,"")
        .replace(/,/g,".")
        .replace(/[^0-9.-]/g,"");
    });
  }

  function bindFormInsideModal(){
    const form = modalBody.querySelector("form[data-cot-form]");
    if (!form) return;

    if (form.dataset.bound === "1") return;
    form.dataset.bound = "1";

    form.addEventListener("submit", async function(ev){
      ev.preventDefault();

      clearValidation(form);

      const msg = precheckItems(form);
      if (msg) {
        showErrorsInModal(form, { errors: { items: [msg] } });
        return;
      }

      // Sanitizar (si existe tu función global, úsala; si no, fallback)
      if (typeof window.__sanitizeCotizacionForm === "function") {
        window.__sanitizeCotizacionForm(form);
      } else {
        sanitizeNumbers(form);
      }

      const fd = new FormData(form);

      // ✅ Importante: aquí usamos fetchJSON porque tu backend AJAX devuelve JSON (ok / errors)
      const r = await fetchJSON(form.action, {
        method: "POST",
        headers: {
          "X-Requested-With": "XMLHttpRequest",
          "X-CSRFToken": getCSRF(form) || ""
        },
        body: fd
      });

      // ✅ Guardó OK
      if (r.ok && r.data && r.data.ok) {
        await cargarTabla();
        await abrirDetalle(r.data.id);
        return;
      }

      // ✅ FALLÓ: mostrar errores REALES (sin borrar el formulario)
      if (r.data) {
        showErrorsInModal(form, r.data);
        return;
      }

      // ✅ Último recurso: si no vino JSON, mostrar texto de respuesta (para debug)
      showErrorsInModal(form, { errors: { server: ["Error inesperado. Revisa consola/response."] } });
      console.error("Respuesta no-JSON en error:", r);
    });
  }

  function bindDetalleInsideModal(){
    modalBody.addEventListener("click", async function(e){
      const btnEdit = e.target.closest("[data-action='editar']");
      if (btnEdit) {
        const id = btnEdit.getAttribute("data-id");
        if (id) abrirEditar(id);
        return;
      }

      const btnDel = e.target.closest("[data-action='eliminar']");
      if (btnDel) {
        const id = btnDel.getAttribute("data-id");
        if (!id) return;

        if (!confirm("¿Eliminar esta cotización?")) return;

        const r = await fetchJSON(urlEliminar(id), {
          method: "POST",
          headers: {
            "X-Requested-With": "XMLHttpRequest",
            "X-CSRFToken": getCSRF(modalBody) || ""
          }
        });

        if (r.ok && r.data && r.data.ok) {
          $("#cotModal").modal("hide");
          await cargarTabla();
        } else {
          alert("No se pudo eliminar.");
        }
      }
    }, { once: true });
  }

  // --------------------------
  // Init
  // --------------------------
  btnFiltrar.addEventListener("click", cargarTabla);
  btnNuevo.addEventListener("click", abrirNuevo);

  fBuscar.addEventListener("keydown", function(e){
    if (e.key === "Enter") { e.preventDefault(); cargarTabla(); }
  });

  bindTablaActions();
  cargarTabla();

})();
</script>
{% endblock %}
