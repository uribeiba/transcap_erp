{% extends "layout/base.html" %}
{% load static %}

{% block title %}Centro de Comercio — Cotizaciones{% endblock %}
{% block page_title %}Cotizaciones{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap4-theme@1.0.0/dist/select2-bootstrap4.min.css" rel="stylesheet" />
<style>
  .table-actions { white-space: nowrap; }
  .badge-estado { font-size: 0.8rem; padding: 0.35rem 0.65rem; }
  .btn-action { padding: 0.25rem 0.5rem; margin: 0 0.125rem; }
  .filtros-panel { background-color: #f8f9fa; border-radius: 0.5rem; padding: 0.75rem; }
  .table-cotizaciones tbody tr { cursor: pointer; transition: background-color 0.2s; }
  .table-cotizaciones tbody tr:hover { background-color: #f8f9fa; }
</style>
{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-3">
    <div class="d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <i class="fas fa-file-invoice text-danger mr-2"></i>
        <h5 class="mb-0 font-weight-bold">Cotizaciones</h5>
      </div>
      <div class="d-flex gap-2">
        <button id="btnExportarExcel" class="btn btn-sm btn-outline-success"><i class="fas fa-file-excel"></i> Excel</button>
        <button id="btnNuevo" class="btn btn-success"><i class="fas fa-plus"></i> Nueva Cotización</button>
      </div>
    </div>

    <hr class="my-3">

    <div class="filtros-panel mb-3">
      <div class="row">
        <div class="col-md-3 mb-2">
          <label class="small text-muted mb-1">Estado</label>
          <select id="fEstado" class="form-control form-control-sm">
            <option value="">Todas</option>
            <option value="PEND">Pendientes</option>
            <option value="ACEP">Aceptadas</option>
            <option value="ANUL">Anuladas</option>
          </select>
        </div>
        <div class="col-md-3 mb-2">
          <label class="small text-muted mb-1">Búsqueda</label>
          <div class="input-group input-group-sm">
            <input id="fBuscar" type="text" class="form-control" placeholder="Cliente, código...">
            <div class="input-group-append">
              <button id="btnFiltrar" class="btn btn-secondary" type="button"><i class="fas fa-search"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="tablaWrap" class="mt-2">
      </div>
  </div>
</div>

<div class="modal fade" id="cotModal" tabindex="-1" role="dialog" aria-hidden="true" data-backdrop="static">
  <div class="modal-dialog modal-xl" role="document">
    <div class="modal-content">
      <div class="modal-header bg-light">
        <h5 class="modal-title" id="cotModalTitle">Cotizaciones</h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>
      <div class="modal-body" id="cotModalBody" style="max-height: 80vh; overflow-y: auto;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="{% static 'js/cotizaciones.js' %}"></script>
<script>
  (function () {
    'use strict';
  
    // URLs Dinámicas
    const URLS = {
      lista: "{% url 'centro_comercio:cotizaciones_lista' %}",
      nuevo: "{% url 'centro_comercio:cotizacion_form' %}",
    };
  
    function urlDetalle(id) {
      return "{% url 'centro_comercio:cotizacion_detalle' 0 %}"
        .replace("/0/", "/" + id + "/");
    }
  
    function urlEditar(id) {
      return "{% url 'centro_comercio:cotizacion_form' 0 %}"
        .replace("/0/", "/" + id + "/");
    }
  
    function urlEliminar(id) {
      return "{% url 'centro_comercio:cotizacion_eliminar' 0 %}"
        .replace("/0/", "/" + id + "/");
    }
  
    function urlDuplicar(id) {
      return "{% url 'centro_comercio:cotizacion_duplicar' 0 %}"
        .replace("/0/", "/" + id + "/");
    }
  
    const tablaWrap = document.querySelector("#tablaWrap");
    const modalBody = document.querySelector("#cotModalBody");
    const modalTitle = document.querySelector("#cotModalTitle");
  
    // ============================================
    // ACTIVACIÓN DE LÓGICA INTERNA (SUMA + SELECT2)
    // ============================================
    function bootCotForm() {
      if ($.fn.select2) {
        $(modalBody)
          .find('select')
          .select2({
            theme: 'bootstrap4',
            width: '100%'
          });
      }
  
      // Ejecutar cálculos automáticos si existen
      if (window.calcularTodo) {
        setTimeout(() => {
          window.calcularTodo();
        }, 300);
      }
    }
  
    // ============================================
    // FUNCIONES DE CARGA
    // ============================================
  
    async function abrirNuevo() {
      modalTitle.innerHTML = 'Nueva Cotización';
  
      $("#cotModal").modal("show");
  
      const res = await fetch(
        URLS.nuevo,
        {
          headers: {
            "X-Requested-With": "XMLHttpRequest"
          }
        }
      );
  
      modalBody.innerHTML = await res.text();
  
      bootCotForm();
  
      // IMPORTANTE:
      // Ya no se hace submit aquí
      // cotizacion.js controla el guardado
    }
  
    async function abrirEditar(id) {
      modalTitle.innerHTML = 'Editar Cotización';
  
      $("#cotModal").modal("show");
  
      const res = await fetch(
        urlEditar(id),
        {
          headers: {
            "X-Requested-With": "XMLHttpRequest"
          }
        }
      );
  
      modalBody.innerHTML = await res.text();
  
      bootCotForm();
  
      // submit manejado por cotizacion.js
    }
  
    async function abrirDetalle(id) {
      modalTitle.innerHTML = 'Detalle Cotización';
  
      $("#cotModal").modal("show");
  
      const res = await fetch(
        urlDetalle(id),
        {
          headers: {
            "X-Requested-With": "XMLHttpRequest"
          }
        }
      );
  
      modalBody.innerHTML = await res.text();
  
      bindAccionesDetalle();
    }
  
    // ============================================
    // EVENTOS DE TABLA (VERSIÓN SEGURA)
    // ============================================
  
    function bindTablaActions() {
  
      // Evita duplicar listeners
      tablaWrap.replaceWith(tablaWrap.cloneNode(true));
  
      const nuevaTablaWrap =
        document.querySelector("#tablaWrap");
  
      nuevaTablaWrap.addEventListener(
        "click",
        async function (e) {
  
          const btn =
            e.target.closest(
              "button, a, .btn-action"
            );
  
          if (!btn) {
  
            const tr =
              e.target.closest(
                "tr[data-id]"
              );
  
            if (tr) {
              abrirDetalle(
                tr.dataset.id
              );
            }
  
            return;
          }
  
          e.stopPropagation();
  
          const tr =
            btn.closest(
              "tr[data-id]"
            );
  
          const id =
            tr
              ? tr.dataset.id
              : null;
  
          if (
            btn.classList.contains(
              "btn-ver"
            ) ||
            btn.dataset.action === "ver"
          ) {
            abrirDetalle(id);
          }
  
          else if (
            btn.classList.contains(
              "btn-editar"
            ) ||
            btn.dataset.action === "editar"
          ) {
            abrirEditar(id);
          }
  
          else if (
            btn.classList.contains(
              "btn-duplicar"
            )
          ) {
            if (
              confirm(
                "¿Duplicar cotización?"
              )
            ) {
              duplicar(id);
            }
          }
  
          else if (
            btn.classList.contains(
              "btn-eliminar"
            )
          ) {
            if (
              confirm(
                "¿Eliminar definitivamente?"
              )
            ) {
              eliminar(id);
            }
          }
  
        }
      );
  
    }
  
    // ============================================
    // OPERACIONES
    // ============================================
  
    async function duplicar(id) {
  
      const res =
        await fetch(
          urlDuplicar(id),
          {
            method: "POST",
            headers: {
              "X-CSRFToken":
                "{{ csrf_token }}",
              "X-Requested-With":
                "XMLHttpRequest"
            }
          }
        );
  
      const r =
        await res.json();
  
      if (r.ok) {
  
        await cargarTabla();
  
        abrirDetalle(r.id);
  
      }
  
    }
  
    async function eliminar(id) {
  
      const res =
        await fetch(
          urlEliminar(id),
          {
            method: "POST",
            headers: {
              "X-CSRFToken":
                "{{ csrf_token }}",
              "X-Requested-With":
                "XMLHttpRequest"
            }
          }
        );
  
      const r =
        await res.json();
  
      if (r.ok) {
        cargarTabla();
      }
  
    }
  
    // ============================================
    // ACCIONES DEL DETALLE
    // ============================================
  
    function bindAccionesDetalle() {
  
      const btnEdit =
        modalBody.querySelector(
          "[data-action='editar']"
        );
  
      if (btnEdit) {
  
        btnEdit.onclick =
          () =>
            abrirEditar(
              btnEdit.dataset.id
            );
  
      }
  
    }
  
    // ============================================
    // CARGA TABLA
    // ============================================
  
    async function cargarTabla() {
  
      const q =
        document.querySelector(
          "#fBuscar"
        ).value;
  
      const res =
        await fetch(
          URLS.lista + "?q=" + q,
          {
            headers: {
              "X-Requested-With":
                "XMLHttpRequest"
            }
          }
        );
  
      tablaWrap.innerHTML =
        await res.text();
  
      bindTablaActions();
  
    }
  
    // ============================================
    // EVENTOS
    // ============================================
  
    document
      .querySelector(
        "#btnNuevo"
      )
      .onclick =
        abrirNuevo;
  
    document
      .querySelector(
        "#btnFiltrar"
      )
      .onclick =
        cargarTabla;


    // ============================================
    // FIX PDF (EVENTO GLOBAL PARA MODALES AJAX)
    // ============================================

    document.addEventListener('click', function(e) {

    const btn = e.target.closest('#btnImprimirPDF, .btn-pdf');

    if (!btn) return;

    e.preventDefault();
    e.stopPropagation();

    const id = btn.getAttribute('data-id');

    if (!id) {
      console.warn('Botón PDF sin data-id');
      return;
    }

    const url = "{% url 'centro_comercio:cotizacion_pdf' 0 %}"
      .replace('/0/', '/' + id + '/');

    console.log('Abriendo PDF:', url);

    // Abrir en nueva pestaña
    window.open(url, '_blank');

    });




  
  
    // ============================================
    // INICIO
    // ============================================
  
    cargarTabla();
  
  })();
  </script>
{% endblock %}
