{% extends "layout/base.html" %}

{% block title %}Eliminar ruta{% endblock %}
{% block page_title %}Eliminar ruta{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <p>¿Estás seguro de que deseas eliminar la ruta:</p>
    <p><strong>{{ ruta.nombre }} ({{ ruta.origen }} → {{ ruta.destino }})</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <a href="{% url 'taller_rutas_viaje_lista' %}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-danger">Eliminar</button>
    </form>
  </div>
</div>
{% endblock %}
