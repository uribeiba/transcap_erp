{% extends "layout/base.html" %}
{% block content_header %}{% endblock %}

{% block content %}
<div class="modal d-block" tabindex="-1" role="dialog" style="background: rgba(0,0,0,.65);">
  <div class="modal-dialog modal-xl" role="document" style="max-width: 1100px;">
    <div class="modal-content" style="border-radius: 0;">

      <div class="modal-header">
        <h4 class="modal-title" style="color:#28a745; font-weight:700;">
          {% block modal_title %}Formulario{% endblock %}
        </h4>
        <a href="{% url 'parametros:panel' %}" class="close" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </a>
      </div>

      <div class="modal-body">
        {% block modal_body %}{% endblock %}
      </div>

    </div>
  </div>
</div>
{% endblock %}
