{% extends "parametros/modal_simple_form.html" %}

{% block modal_title %}Cambiar Logo{% endblock %}

{% block form_content %}
<form method="post" action="{{ request.path }}" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.non_field_errors }}

  <div class="form-group">
    <label>Logo</label>
    {{ form.logo }}
    {{ form.logo.errors }}
    <small class="text-muted">Formatos recomendados: PNG/JPG. Ideal: fondo transparente.</small>
  </div>

  <div class="d-flex justify-content-end">
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-save"></i> Guardar
    </button>
  </div>
</form>
{% endblock %}
