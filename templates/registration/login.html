{% extends "layout/base.html" %}
{% load static %}

{% block content %}
<div class="container" style="max-width:480px; margin-top:80px;">
    <h3 class="mb-4">Iniciar sesión</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary btn-block" type="submit">
            Ingresar
        </button>
    </form>
</div>
{% endblock %}
