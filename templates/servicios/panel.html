{% extends "layout/base.html" %}
{% load static %}

{% block page_title %}Servicios{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Servicios</h3>
                    <div class="card-tools">
                        <button type="button" class="btn btn-primary btn-sm" 
                                data-toggle="modal" data-target="#modal-servicio">
                            <i class="fas fa-plus mr-1"></i> Nuevo Servicio
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Filtros -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" 
                                   placeholder="Buscar..." id="input-buscar">
                        </div>
                        <div class="col-md-3">
                            <select class="form-control" id="select-estado">
                                <option value="">Todos los estados</option>
                                {% for valor, texto in estados %}
                                    <option value="{{ valor }}">{{ texto }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <!-- Tabla de servicios -->
                    <div id="tabla-servicios-container">
                        {% include 'servicios/_tabla.html' %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal para formulario -->
<div class="modal fade" id="modal-servicio" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nuevo Servicio</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div id="modal-servicio-body" class="modal-body">
                <!-- Cargado por AJAX -->
            </div>
        </div>
    </div>
</div>

<!-- Modal para detalle -->
<div class="modal fade" id="modal-detalle" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Detalle del Servicio</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div id="modal-detalle-body" class="modal-body">
                <!-- Cargado por AJAX -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/servicios.js' %}"></script>
{% endblock %}
